name: eden
description: "AI-first requirements platform — expert panel engine + living story map"
schema: eve/compose/v2

x-eve:
  packs:
    - source: ./

registry: "eve"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: ./apps/api/Dockerfile
    ports: [3000]
    x-eve:
      api_spec:
        type: openapi
      cli:
        name: eden
        bin: cli/bin/eden
      permissions: [jobs:write, events:write, threads:write, projects:write]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${managed.db.url}
      CORS_ORIGIN: "https://eden.eh1.incept5.dev,https://web.${ORG_SLUG}-eden-sandbox.eh1.incept5.dev"
      # EVE_API_URL, EVE_PROJECT_ID, EVE_SERVICE_TOKEN are auto-injected by the platform.
      # EDEN_API_URL is the app's own internal API — derived from K8s service naming.
      EDEN_API_URL: "http://${ENV_NAME}-api:3000"

  web:
    build:
      context: ./apps/web
      dockerfile: ./apps/web/Dockerfile
    ports: [80]
    environment:
      API_SERVICE_HOST: ${ENV_NAME}-api
    depends_on:
      api:
        condition: service_healthy
    x-eve:
      ingress:
        public: true
        port: 80
        alias: eden

  migrate:
    image: public.ecr.aws/w7c4v0w3/eve-horizon/migrate:latest
    environment:
      DATABASE_URL: ${managed.db.url}
      MIGRATIONS_DIR: /migrations
    x-eve:
      role: job
      files:
        - source: db/migrations
          target: /migrations

  db:
    x-eve:
      role: managed_db
      managed:
        class: db.p1
        engine: postgres
        engine_version: "16"

environments:
  sandbox:
    pipeline: deploy

workflows:
  question-evolution:
    trigger:
      app:
        event: question.answered
    with_apis:
      - service: api
        description: Eden Story Map API for reading questions/tasks and creating changesets
    steps:
      - name: triage
        agent:
          name: question-triage
      - name: evolve
        depends_on: [triage]
        condition: "triage.status == 'needs_changes'"
        agent:
          name: question-agent
    hints:
      timeout_seconds: 600
      permission_policy: yolo

  alignment-check:
    trigger:
      app:
        event: changeset.accepted
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating questions
    steps:
      - name: align
        agent:
          name: alignment
    hints:
      timeout_seconds: 600
      permission_policy: yolo

  ingestion-pipeline:
    trigger:
      app:
        event: doc.ingest
    steps:
      - name: extract
        agent:
          name: extraction
      - name: synthesize
        depends_on: [extract]
        agent:
          name: synthesis
        with_apis:
          - service: api
            description: Eden Story Map API for reading map state and creating changesets
    hints:
      timeout_seconds: 600
      permission_policy: yolo

pipelines:
  deploy:
    steps:
      - name: build
        action: { type: build }
      - name: release
        depends_on: [build]
        action: { type: release }
      - name: deploy
        depends_on: [release]
        action: { type: deploy }
      - name: migrate
        depends_on: [deploy]
        action:
          type: job
          service: migrate
      - name: smoke-test
        depends_on: [migrate]
        script:
          run: ./scripts/smoke-test.sh
          timeout: 300
      - name: smoke-test-p2
        depends_on: [smoke-test]
        script:
          run: ./scripts/smoke-test-p2.sh
          timeout: 300
