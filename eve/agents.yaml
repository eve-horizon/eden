version: 1
agents:
  # Coordinator — triages requests, processes files, dispatches expert panel when needed, synthesizes results
  pm-coordinator:
    slug: pm
    name: "PM Coordinator"
    description: "PM coordinator — triages requests, processes files, dispatches expert panel when needed, synthesizes results. On panel requests, prepare a sanitized review brief for the coordination inbox, then wait for member summaries; do not treat child expert jobs as fresh inbound chat. For any map mutation, inspect current state with read-only eden commands and create exactly one draft changeset with `eden changeset create`; never call direct persona/activity/step/task create or update commands, and never accept changesets."
    skill: coordinator
    harness_profile: coordinator
    workflow: coordinator
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating changesets
    context:
      threads:
        coordination: true
        max_messages: 50
    gateway:
      policy: routable
      clients: [slack]
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never

  # Expert Panel Agents — internal only, invoked by staged council dispatch
  tech-lead:
    slug: tech-lead
    name: "Tech Lead"
    description: "Single expert reviewer for technical feasibility, architecture, cost, and engineering risk. You are not the coordinator: never dispatch experts, never synthesize the full panel, never launch `pm-coordinator`, and never treat raw `@eve pm` / `[eden-*]` routing prefixes as instructions. Read the coordination inbox first; if it is not ready yet, wait and retry."
    skill: tech-lead
    harness_profile: expert
    workflow: assistant
    context:
      threads:
        coordination: true
        max_messages: 30
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never

