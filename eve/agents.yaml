  # Phase 2: Ingestion Pipeline Agents
  ingestion:
    slug: ingestion
    name: "Ingestion Agent"
    description: "Extracts raw content from uploaded documents (PDF, DOCX, images, audio)"
    skill: ingestion
    harness_profile: expert
    workflow: assistant
    gateway:
      policy: none
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never

  extraction:
    slug: extraction
    name: "Extraction Agent"
    description: "Identifies personas, activities, steps, tasks, questions from extracted content"
    skill: extraction
    harness_profile: coordinator
    workflow: assistant
    gateway:
      policy: none
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never

  synthesis:
    slug: synthesis
    name: "Synthesis Agent"
    description: "Compares extracted requirements against current map state and creates draft changesets only via `eden changeset create`. Read state with `eden map`, `eden step list`, and `eden task list`; never mutate personas/activities/steps/tasks directly and never accept changesets."
    skill: synthesis
    harness_profile: coordinator
    workflow: assistant
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating changesets
    context:
      memory:
        agent: shared
        categories: [decisions, conventions, context]
        max_items: 20
      threads:
        coordination: true
        max_messages: 30
    gateway:
      policy: none
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never

  # Phase 3: Intelligence Layer Agents
  map-chat:
    slug: map-chat
    name: "Map Chat"
    description: "Conversational map editing — interprets natural language requests and proposes draft changesets only via `eden changeset create`. Read current state first with `eden map`, `eden step list --project`, and `eden task list --project`; never create personas/activities/steps/tasks directly and never accept changesets."
    skill: map-chat
    harness_profile: coordinator
    workflow: assistant
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating changesets
    context:
      memory:
        agent: shared
        categories: [decisions, conventions, context]
        max_items: 20
    gateway:
      policy: none
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never

  alignment:
    slug: alignment
    name: "Alignment Agent"
    description: "Scans map for conflicts, gaps, duplicates, and assumptions after changeset acceptance. Use `eden` plus `jq` only for analysis; do not call python/python3 or direct REST endpoints."
    skill: alignment
    harness_profile: expert
    workflow: assistant
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating questions
    context:
      memory:
        agent: shared
        categories: [decisions, conventions]
        max_items: 20
    gateway:
      policy: none
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never

  question-triage:
    slug: question-triage
    name: "Question Triage"
    description: "Fast classification for `question.answered` events. Extract `payload.question_id`, run `eden question show <id> --json`, and return only a json-result status of `needs_changes` or `informational`. Do not read repo files, run `eden --help`, inspect the full map, or call python/python3."
    skill: question-triage
    harness_profile: fast
    workflow: assistant
    gateway:
      policy: none
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never

  question-agent:
    slug: question-agent
    name: "Question Agent"
    description: "Evaluates answered questions and, when the answer implies a map update, creates exactly one draft changeset via `eden changeset create --project <id> --file /tmp/changeset.json --json`. Read only the answered question and current map state with `eden question show` and `eden map` plus `jq`; do not read repo files, run `eden --help`, call python/python3, mutate personas/activities/steps/tasks directly, or accept changesets."
    skill: question
    harness_profile: expert
    workflow: assistant
    with_apis:
      - service: api
        description: Eden Story Map API for reading questions and creating changesets
    gateway:
      policy: none
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never

  # Phase 6: Project Wizard Agent
  map-generator:
    slug: map-generator
    name: "Map Generator"
    description: "Generates initial story map structures from project descriptions"
    skill: map-generator
    harness_profile: generator
    workflow: assistant
    with_apis:
      - service: api
        description: Eden Story Map API for creating personas, activities, steps, tasks, and changesets
    access:
      permissions:
        - projects:write
        - envdb:write
        - envs:write
    gateway:
      policy: none
    policies:
      permission_policy: yolo
      git:
        commit: never
        push: never
