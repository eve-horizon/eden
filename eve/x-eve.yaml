version: 1
agents:
  profiles:
    # Coordinator — triage, transcription, synthesis: needs medium reasoning
    coordinator:
      - harness: claude
        model: sonnet
        reasoning_effort: medium

    # Expert — deep analysis, needs strong reasoning
    expert:
      - harness: claude
        model: sonnet
        reasoning_effort: high

    # Fast — quick tasks (map-chat simple edits, map generator initial pass)
    fast:
      - harness: claude
        model: sonnet
        reasoning_effort: low

    # Generator — fast structured output (story map generation)
    generator:
      - harness: claude
        model: sonnet
        reasoning_effort: high

    # Monitor — lightweight classification
    monitor:
      - harness: claude
        model: sonnet
