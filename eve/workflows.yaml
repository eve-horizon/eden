version: 1
workflows:
  ingestion-pipeline:
    trigger:
      system:
        event: doc.ingest
    resource_refs:
      - uri: "ingest://${event.payload.ingest_id}/${event.payload.file_name}"
        label: "Ingested document"
        required: true
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating changesets
    steps:
      - name: extract
        agent:
          name: extraction
      - name: synthesize
        depends_on: [extract]
        agent:
          name: synthesis
    hints:
      timeout_seconds: 600
      permission_policy: yolo

  alignment-check:
    trigger:
      app:
        event: changeset.accepted
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating questions
    steps:
      - name: align
        agent:
          name: alignment
    hints:
      timeout_seconds: 600
      permission_policy: yolo

  question-evolution:
    trigger:
      app:
        event: question.answered
    with_apis:
      - service: api
        description: Eden Story Map API for reading questions/tasks and creating changesets
    steps:
      - name: triage
        agent:
          name: question-triage
      - name: evolve
        depends_on: [triage]
        condition: "triage.status == 'needs_changes'"
        agent:
          name: question-agent
    hints:
      timeout_seconds: 600
      permission_policy: yolo
