version: 1
workflows:
  ingestion-pipeline:
    trigger:
      system:
        event: doc.ingest
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating changesets
    steps:
      - name: extract
        agent:
          name: extraction
      - name: synthesize
        depends_on: [extract]
        agent:
          name: synthesis
    hints:
      timeout_seconds: 600
      permission_policy: yolo

  alignment-check:
    trigger:
      app:
        event: changeset.accepted
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating questions
    steps:
      - name: align
        agent:
          name: alignment
    hints:
      timeout_seconds: 600
      permission_policy: yolo

  question-evolution:
    trigger:
      app:
        event: question.answered
    with_apis:
      - service: api
        description: Eden Story Map API for reading questions/tasks and creating changesets
    steps:
      - name: evolve
        agent:
          name: question-agent
    hints:
      timeout_seconds: 600
      permission_policy: yolo
